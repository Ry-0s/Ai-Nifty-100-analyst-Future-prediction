<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f14;
      color: white;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      border: 1px solid #27272a;
      border-radius: 12px;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #60a5fa, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 11px;
      color: #71717a;
      margin-bottom: 32px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
    }
    .loader-container {
      width: 240px;
      height: 2px;
      background: #1f1f2e;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .loader-bar {
      width: 30%;
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #a855f7);
      border-radius: 2px;
      animation: loading 2s ease-in-out infinite;
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    .status {
      font-size: 10px;
      color: #52525b;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
  </style>
</head>
<body>
  <div class="title">NIFTY 100 AI Predictor</div>
  <div class="subtitle">Neural Forecasting Engine</div>
  <div class="loader-container"><div class="loader-bar"></div></div>
  <div class="status">Bootstrapping LSTM layers...</div>
</body>
</html>
